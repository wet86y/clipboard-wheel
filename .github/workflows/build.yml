name: build

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run repository self-check
        shell: pwsh
        run: .\scripts\run-self-check.ps1
