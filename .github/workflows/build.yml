name: build

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run repository self-check
        shell: pwsh
        run: .\scripts\run-self-check.ps1

      - name: Upload native Release executable
        uses: actions/upload-artifact@v4
        with:
          name: super-middle-key-win-x64
          path: artifacts/超级中键-win-x64/超级中键.exe
          if-no-files-found: error
